name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swiftlang/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Build release binary
        run: swift build -c release --disable-sandbox

      - name: Prepare artifact
        run: cp .build/release/Stem stem-macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: stem-macos-arm64
          generate_release_notes: true
