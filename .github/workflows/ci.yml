name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Build
        run: swift build -c release --disable-sandbox

      - name: Sign binary with entitlements
        run: codesign --force --sign - --entitlements Sources/Sound/Sound.entitlements .build/release/Sound

      - name: Test
        run: swift test --disable-sandbox
